<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quivo Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcome-screen" class="overlay">
        <div class="welcome-box">
            <div class="logo-quivo">Q</div>
            <h1>Quivo Chat</h1>
            
            <button id="btn-buat-id">Buat ID Mu</button>
            
            <div id="id-display" style="display: none; margin-top: 20px;">
                <p>ID Quivo Kamu:</p>
                <h2 id="generated-id" style="color: #e94560;">QVXXXXXXXX</h2>
                <button id="btn-masuk">Masuk ke Chat</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display: none; height: 100vh;">
        <div class="sidebar">
            <h3 id="my-id-label">ID: -</h3>
            <hr>
            <p>Kontak</p>
            <div style="color: gray; font-size: 12px;">Belum ada kontak</div>
        </div>
        <div class="chat-area">
            <div id="chat-box" style="flex: 1; padding: 20px; overflow-y: auto;">
                <p style="color: gray;">Selamat datang di Quivo Chat!</p>
            </div>
            <div class="input-group">
                <input type="text" id="msg-input" placeholder="Ketik pesan...">
                <button id="btn-kirim">Kirim</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
