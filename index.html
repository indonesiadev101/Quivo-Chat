<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quivo Chat - Realtime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcome-screen" class="overlay">
        <div class="welcome-box">
            <div class="logo-quivo">Q</div>
            <h1>Quivo Chat</h1>
            <button id="btn-buat-id">Buat ID Mu</button>
            <div id="id-display" style="display: none; margin-top: 20px;">
                <p>ID Kamu:</p>
                <h2 id="generated-id" style="color: #e94560;">QVXXXXXXXX</h2>
                <button id="btn-masuk">Masuk ke Chat</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display: none; height: 100vh; flex-direction: row;">
        <aside class="sidebar">
            <h3 id="my-id-label" style="color: #e94560;">ID: -</h3>
            <button class="btn-sidebar" id="btn-tambah-kontak">+ Tambah ID Quivo</button>
            <div id="contacts-list" style="margin-top: 20px;">
                <p style="font-size: 11px; color: gray;">KLIK KONTAK UNTUK CHAT</p>
                <div id="contacts-container"></div>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header" id="current-chat-target">Pilih Kontak...</header>
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Ketik pesan..." disabled>
                <button id="btn-kirim" disabled>Kirim</button>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
